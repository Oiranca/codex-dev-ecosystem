model = "gpt-5.4"
model_reasoning_effort = "medium"

[features]
multi_agent = true

[tui]
status_line = ["model-with-reasoning", "context-remaining", "project-root", "git-branch", "context-used"]

[plugins."github@openai-curated"]
enabled = true

# Enable Linear if you actively track work there.
# [mcp_servers.linear]
# url = "https://mcp.linear.app/mcp"
#
# [plugins."linear@openai-curated"]
# enabled = true

# Keep heavy MCP servers disabled unless you need them for the current task.
# Uncomment the blocks you want to use, then restart Codex.
#
# [mcp_servers.playwright]
# command = "npx"
# args = ["@playwright/mcp@latest"]
#
# [mcp_servers.playwright.tools.browser_click]
# approval_mode = "approve"
#
# [mcp_servers.playwright.tools.browser_run_code]
# approval_mode = "approve"
#
# [mcp_servers.playwright.tools.browser_resize]
# approval_mode = "approve"
#
# [mcp_servers.playwright.tools.browser_close]
# approval_mode = "approve"
#
# [mcp_servers.stitch]
# url = "https://stitch.googleapis.com/mcp"
#
# [agents]
# max_threads = 6
# max_depth = 1

# Global token/context guidance lives in `rules/global-guidelines.md`.
# Current default: caveman ultra loads on startup/resume and persists for the full session unless the user disables it.
# For stronger local startup behavior, use the launchers in `scripts/` or source
# `scripts/caveman-aliases.zsh` from your shell rc.

# Add your trusted projects locally in config.toml, for example:
# [projects."/absolute/path/to/project"]
# trust_level = "trusted"

# Add connector-specific app approval overrides locally in config.toml when needed.
