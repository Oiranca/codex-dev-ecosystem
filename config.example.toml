model = "gpt-5.4"
model_reasoning_effort = "medium"

[features]
multi_agent = true

[tui]
status_line = ["model-with-reasoning", "context-remaining", "project-root", "git-branch", "context-used"]

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.playwright.tools.browser_click]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_run_code]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_resize]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_close]
approval_mode = "approve"

[agents]
max_threads = 6
max_depth = 1

# Global token/context guidance lives in `rules/global-guidelines.md`.
# Current default: caveman ultra for chat output too, unless user explicitly disables it.

# Add your trusted projects locally in config.toml, for example:
# [projects."/absolute/path/to/project"]
# trust_level = "trusted"

# Add connector-specific app approval overrides locally in config.toml when needed.
